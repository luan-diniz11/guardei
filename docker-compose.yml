version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0-alpine
    container_name: guardei-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-guardei_db}
      MYSQL_USER: ${DB_USER:-guardei_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-guardei_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
      interval: 5s
    networks:
      - guardei-network

  # Backend (Express + Node)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: guardei-backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: mysql://${DB_USER:-guardei_user}:${DB_PASSWORD:-guardei_password}@db:3306/${DB_NAME:-guardei_db}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      timeout: 5s
      retries: 10
      interval: 5s
    networks:
      - guardei-network

  # Frontend (React + Vite + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://backend:3001
    container_name: guardei-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      timeout: 5s
      retries: 10
      interval: 5s
    networks:
      - guardei-network

volumes:
  mysql_data:
    driver: local

networks:
  guardei-network:
    driver: bridge
