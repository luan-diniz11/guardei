# Arquivo docker-compose para Desenvolvimento

version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: guardei-db-dev
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-guardei_db}
      MYSQL_USER: ${DB_USER:-guardei_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-guardei_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
      interval: 5s
    networks:
      - guardei-network-dev

  # Backend (Express + Node) - Com hot reload
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: guardei-backend-dev
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: mysql://${DB_USER:-guardei_user}:${DB_PASSWORD:-guardei_password}@db:3306/${DB_NAME:-guardei_db}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      timeout: 5s
      retries: 10
      interval: 5s
    networks:
      - guardei-network-dev

  # Frontend (React + Vite) - Com hot reload
  frontend:
    image: node:18-alpine
    container_name: guardei-frontend-dev
    working_dir: /app
    command: npm run dev
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://backend:3001
    networks:
      - guardei-network-dev

volumes:
  mysql_data_dev:
    driver: local

networks:
  guardei-network-dev:
    driver: bridge
